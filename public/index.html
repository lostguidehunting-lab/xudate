10. Use the actual cost_mt values from the ingredient database

      const data = await response.json();
      if (data.error) throw new Error(data.error.message || "API error");
      const text = data.content?.map(b => b.text || "").join("") || "";
      let cleaned = text.replace(/```json|```/g, "").trim();
      
      // Attempt to fix truncated JSON
      let parsed;
      try {
        parsed = JSON.parse(cleaned);
      } catch (parseErr) {
        // Try closing open strings and braces
        let fixed = cleaned;
        // Close any open string
        const quoteCount = (fixed.match(/"/g) || []).length;
        if (quoteCount % 2 !== 0) fixed += '"';
        // Count braces and brackets
        const openBraces = (fixed.match(/{/g) || []).length;
        const closeBraces = (fixed.match(/}/g) || []).length;
        const openBrackets = (fixed.match(/\[/g) || []).length;
        const closeBrackets = (fixed.match(/\]/g) || []).length;
        // Close arrays then objects
        for (let i = 0; i < openBrackets - closeBrackets; i++) fixed += ']';
        for (let i = 0; i < openBraces - closeBraces; i++) fixed += '}';
        try {
          parsed = JSON.parse(fixed);
        } catch (e2) {
          // Last resort: find the last complete top-level key
          const lastGoodBrace = fixed.lastIndexOf('}');
          if (lastGoodBrace > 0) {
            let truncated = fixed.substring(0, lastGoodBrace + 1);
            // Ensure it ends properly
            const ob = (truncated.match(/{/g) || []).length;
            const cb = (truncated.match(/}/g) || []).length;
            for (let i = 0; i < ob - cb; i++) truncated += '}';
            parsed = JSON.parse(truncated);
          } else {
            throw parseErr;
          }
        }

                  borderRadius: 6, color: "#D4D9E1", fontSize: 14,

                  marginTop: 10, padding: "10px 14px", background: "#111620",

                  <span style={{ color: "#4A9B6E", fontWeight: 600 }}>{blend.region}</span>

                  width: "100%", padding: "10px 14px", background: "#111620",

              />
              <div style={{ fontSize: 11, color: "#3A4555", marginTop: 6 }}>
                Used for climate modeling, pellet breakdown dynamics, and application timing.
              </div>
            </div>

            <div style={{ marginBottom: 28 }}>
              <label style={{ fontSize: 11, color: "#6B7A8D", letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 600, display: "block", marginBottom: 8 }}>
                Site Area
              </label>
              <div style={{ display: "flex", gap: 12 }}>
                <input
                  type="number" value={siteArea}
                  onChange={e => setSiteArea(e.target.value)}
                  placeholder={areaUnit === "acres" ? "100" : "435600"}
                  style={{
                    flex: 1, padding: "10px 14px", background: "#111620",
                    border: "1px solid #1E2A3A", borderRadius: 6, color: "#D4D9E1", fontSize: 14,
                  }}
                />
                <div style={{ display: "flex", borderRadius: 6, overflow: "hidden", border: "1px solid #1E2A3A" }}>
                  {["acres", "sqft"].map(u => (
                    <button
                      key={u}
                      onClick={() => setAreaUnit(u)}
                      style={{
                        padding: "10px 16px", border: "none", cursor: "pointer",
                        background: areaUnit === u ? "#1A4A3A" : "#111620",
                        color: areaUnit === u ? "#4A9B6E" : "#4A5568",
                        fontSize: 12, fontWeight: 600, fontFamily: "inherit",
                        transition: "all 0.2s",
                      }}
                    >{u === "sqft" ? "sq ft" : "acres"}</button>
                  ))}
                </div>
              </div>
              <div style={{ fontSize: 11, color: "#3A4555", marginTop: 6 }}>
                Xudate will calculate total product needed, batch size, and project economics.
              </div>
            </div>

            {/* Soil Test Inputs */}
            {SOIL_FIELDS.filter(s => !s.optional).map(section => (
              <div key={section.section} style={{ marginBottom: 24 }}>
                <div style={{
                  fontSize: 11, color: "#4A9B6E", letterSpacing: 2, textTransform: "uppercase",
                  fontWeight: 700, marginBottom: 12, paddingBottom: 8,
                  borderBottom: "1px solid #1A2332",
                }}>{section.section}</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 12 }}>
                  {section.fields.map(field => (
                    <div key={field.key}>
                      <label style={{ fontSize: 11, color: "#6B7A8D", fontWeight: 500, display: "block", marginBottom: 4 }}>
                        {field.label} <span style={{ color: "#3A4555" }}>({field.unit})</span>
                      </label>
                      <input
                        type="number" step="any"
                        placeholder={field.placeholder}
                        value={soil[field.key]}
                        onChange={e => handleSoilChange(field.key, e.target.value)}
                        style={{
                          width: "100%", padding: "8px 12px", background: "#111620",
                          border: "1px solid #1E2A3A", borderRadius: 6, color: "#D4D9E1",
                          fontSize: 14, fontFamily: "'IBM Plex Mono', monospace",
                        }}
                      />
                    </div>
                  ))}
                </div>
              </div>
            ))}

            {/* Biology Section Toggle */}
            <div style={{ marginBottom: 24 }}>
              <button
                onClick={() => setShowBiology(!showBiology)}
                style={{
                  width: "100%", padding: "14px 16px", background: "#111620",
                  border: "1px solid #1E2A3A", borderRadius: 8, cursor: "pointer",
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  fontFamily: "inherit",
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{
                    width: 8, height: 8, borderRadius: "50%",
                    background: showBiology ? "#4A9B6E" : "#3A4555",
                    transition: "background 0.2s",
                  }} />
                  <span style={{
                    fontSize: 11, color: showBiology ? "#4A9B6E" : "#6B7A8D",
                    letterSpacing: 2, textTransform: "uppercase", fontWeight: 700,
                  }}>
                    Biology (Optional)
                  </span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 11, color: "#3A4555" }}>
                    PLFA, Enzymes, Respiration, AMF
                  </span>
                  <span style={{
                    fontSize: 16, color: "#4A9B6E", transition: "transform 0.2s",

                  }}>&#9662;</span>
                </div>
              </button>

              {showBiology && (
                <div style={{
                  marginTop: 12, padding: "16px",
                  background: "#0D1218", border: "1px solid #1E2A3A", borderRadius: 8,
                  animation: "slideUp 0.2s ease",
                }}>
                  <div style={{ fontSize: 12, color: "#6B7A8D", marginBottom: 16, lineHeight: 1.6 }}>
                    Enter biology data from PLFA analysis, enzyme assays, or respiration tests. This enables Xudate to assess the living system in your soil and optimize the blend for biological recovery. Future versions will prescribe specific microbial inoculants.
                  </div>
                  {SOIL_FIELDS.filter(s => s.optional).map(section => (
                    <div key={section.section} style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 12 }}>
                      {section.fields.map(field => (
                        <div key={field.key}>
                          <label style={{ fontSize: 11, color: "#6B7A8D", fontWeight: 500, display: "block", marginBottom: 4 }}>
                            {field.label} <span style={{ color: "#3A4555" }}>({field.unit})</span>
                          </label>
                          <input
                            type="number" step="any"
                            placeholder={field.placeholder}
                            value={soil[field.key]}
                            onChange={e => handleSoilChange(field.key, e.target.value)}
                            style={{
                              width: "100%", padding: "8px 12px", background: "#111620",
                              border: "1px solid #1E2A3A", borderRadius: 6, color: "#D4D9E1",
                              fontSize: 14, fontFamily: "'IBM Plex Mono', monospace",
                            }}
                          />
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Run Button */}
            <button
              onClick={runEngine}
              disabled={loading || !hasData}
              style={{
                width: "100%", padding: "16px", border: "none", borderRadius: 8, cursor: loading || !hasData ? "default" : "pointer",
                background: loading ? "#1A2332" : !hasData ? "#1A2332" : "linear-gradient(135deg, #2D6B4A 0%, #4A9B6E 100%)",
                color: loading || !hasData ? "#4A5568" : "#fff",
                fontSize: 15, fontWeight: 700, letterSpacing: 0.5,
                fontFamily: "inherit",
                transition: "all 0.3s",
                marginTop: 8,
              }}
            >
              {loading ? (
                <span style={{ animation: "pulse 2s ease-in-out infinite" }}>

                </span>
              ) : "Compound Prescription"}
            </button>
            {error && (
              <div style={{ marginTop: 12, padding: "10px 14px", background: "#3D1417", border: "1px solid #7F2D35", borderRadius: 6, color: "#F87171", fontSize: 13 }}>

              </div>

          </div>
        )}

        {/* RESULTS TAB */}
        {activeTab === "results" && result && (
          <div ref={resultRef} style={{ animation: "slideUp 0.3s ease" }}>

            {result.priority_flags && (
              <div style={{ marginBottom: 28 }}>

                      <span style={{ fontSize: 12, color: "#6B7A8D" }}>{f.note}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {result.gap_analysis && (
              <div style={{ marginBottom: 28 }}>

                          <th key={h} style={{ padding: "10px 12px", textAlign: "left", color: "#6B7A8D", fontWeight: 600, fontSize: 10, letterSpacing: 1, textTransform: "uppercase" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {result.gap_analysis.map((g, i) => (
                        <tr key={i} style={{ borderBottom: "1px solid #151D28" }}>
                          <td style={{ padding: "8px 12px", fontWeight: 600, color: "#C0C8D4" }}>{g.parameter}</td>
                          <td style={{ padding: "8px 12px", fontFamily: "'IBM Plex Mono', monospace", color: "#D4D9E1" }}>{g.value}</td>
                          <td style={{ padding: "8px 12px", color: "#6B7A8D" }}>{g.target}</td>
                          <td style={{ padding: "8px 12px" }}><StatusTag status={g.status} /></td>
                          <td style={{ padding: "8px 12px", color: "#8899AA", maxWidth: 200 }}>{g.direction}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

              <div style={{ marginBottom: 28 }}>

                <div style={{ background: "#111620", border: "1px solid #1E2A3A", borderRadius: 8, padding: "16px 20px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
                    <StatusTag status={result.biology_assessment.overall_status} />
                    <span style={{ fontSize: 12, color: "#6B7A8D" }}>
                      {result.biology_assessment.data_available ? "Biology data analyzed" : "No biology data provided"}
                    </span>
                  </div>

                  {result.biology_assessment.findings?.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      {result.biology_assessment.findings.map((f, i) => (
                        <div key={i} style={{
                          display: "flex", alignItems: "center", gap: 12,
                          padding: "6px 0", borderBottom: i < result.biology_assessment.findings.length - 1 ? "1px solid #151D28" : "none",
                        }}>
                          <StatusTag status={f.status} />
                          <span style={{ fontSize: 12, color: "#C0C8D4", fontWeight: 600, minWidth: 140 }}>{f.parameter}</span>
                          <span style={{ fontSize: 12, color: "#6B7A8D", fontFamily: "'IBM Plex Mono', monospace" }}>{f.value}</span>
                          <span style={{ fontSize: 11, color: "#6B7A8D", flex: 1 }}>{f.interpretation}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {result.biology_assessment.biological_strategy && (
                    <div style={{
                      padding: "12px 14px", background: "#0D1218", borderRadius: 6,
                      fontSize: 12, color: "#A0AABB", lineHeight: 1.6, marginBottom: 10,
                    }}>
                      <div style={{ fontSize: 10, color: "#4A9B6E", letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700, marginBottom: 6 }}>
                        Biological Strategy
                      </div>
                      {result.biology_assessment.biological_strategy}
                    </div>

                  {result.biology_assessment.future_inoculant_notes && (
                    <div style={{
                      padding: "12px 14px", background: "#0D1218", borderRadius: 6,
                      fontSize: 12, color: "#8899AA", lineHeight: 1.6,
                      borderLeft: "3px solid #2D6B4A",

                      <div style={{ fontSize: 10, color: "#6B7A8D", letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700, marginBottom: 6 }}>

                      {result.biology_assessment.future_inoculant_notes}

                </div>
              </div>

                <div style={{ background: "#111620", border: "1px solid #1E2A3A", borderRadius: 8, overflow: "hidden" }}>

                    const ing = INGREDIENTS.find(ig => ig.name === b.ingredient);
                    const pct = (b.pct * 100).toFixed(1);
                    const costContrib = ing ? (b.pct * ing.cost_mt).toFixed(0) : "?";
                    return (
                      <div key={i} style={{
                        padding: "12px 16px", borderBottom: i < result.blend.length - 1 ? "1px solid #151D28" : "none",

                          <span style={{ fontSize: 11, color: "#6B7A8D", fontFamily: "'IBM Plex Mono', monospace" }}>

                          <div style={{ width: "100%", height: 4, background: "#1A2332", borderRadius: 2, overflow: "hidden" }}>

                              width: `${Math.min(b.pct * 100 * 3, 100)}%`, height: "100%",
                              background: "linear-gradient(90deg, #2D6B4A, #4A9B6E)",
                              borderRadius: 2, transition: "width 0.5s ease",

                        </div>
                        <div style={{ marginLeft: 62, fontSize: 11, color: "#6B7A8D", lineHeight: 1.5 }}>

                        </div>
                      </div>
                    );

                {result.blend_chemistry && (
                  <div style={{
                    marginTop: 12, padding: "12px 16px", background: "#111620",

                    display: "flex", gap: 20, flexWrap: "wrap",

                    {Object.entries(result.blend_chemistry).map(([k, v]) => (
                      <div key={k} style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 10, color: "#6B7A8D", fontWeight: 600, letterSpacing: 1, textTransform: "uppercase" }}>{k}</div>
                        <div style={{ fontSize: 16, fontWeight: 700, color: "#4A9B6E", fontFamily: "'IBM Plex Mono', monospace" }}>
                          {(v * 100).toFixed(2)}%
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

            {/* Interactions */}
            {result.interactions_flagged?.length > 0 && (
              <div style={{ marginBottom: 28 }}>

                    <div key={i} style={{
                      padding: "10px 14px", background: "#111620", border: "1px solid #1E2A3A",

                        <StatusTag status={int.type} />
                        <span style={{ fontSize: 13, fontWeight: 600, color: "#C0C8D4" }}>{int.pair}</span>

                      <div style={{ fontSize: 12, color: "#6B7A8D", marginLeft: 0 }}>{int.note}</div>
                      {int.action && <div style={{ fontSize: 12, color: "#8899AA", marginTop: 4, fontStyle: "italic" }}>Action: {int.action}</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Climate Analysis & Application Timing */}
            {result.climate_analysis && (
              <div style={{ marginBottom: 28 }}>
                <div style={{ fontSize: 11, color: "#4A9B6E", letterSpacing: 2, textTransform: "uppercase", fontWeight: 700, marginBottom: 12 }}>
                  Climate Analysis & Application Timing
                </div>
                <div style={{ background: "#111620", border: "1px solid #1E2A3A", borderRadius: 8, padding: "16px 20px" }}>
                  <div style={{ display: "flex", gap: 20, flexWrap: "wrap", marginBottom: 14 }}>
                    {[
                      ["Location", result.climate_analysis.location],
                      ["Climate Zone", result.climate_analysis.climate_zone],
                      ["Precip", result.climate_analysis.avg_annual_precip_mm + " mm/yr"],
                      ["Frost-Free", result.climate_analysis.frost_free_days + " days"],
                      ["Season", result.climate_analysis.growing_season],
                    ].map(([label, val]) => (
                      <div key={label}>
                        <div style={{ fontSize: 10, color: "#6B7A8D", letterSpacing: 1, textTransform: "uppercase", fontWeight: 600 }}>{label}</div>
                        <div style={{ fontSize: 13, color: "#D4D9E1", fontWeight: 500 }}>{val}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ fontSize: 12, color: "#8899AA", lineHeight: 1.6, marginBottom: 14 }}>
                    {result.climate_analysis.climate_factors}
                  </div>

                    <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
                      <div style={{ flex: 1, padding: "10px 12px", background: "#0A3D1E", border: "1px solid #1A7F3F", borderRadius: 6 }}>
                        <div style={{ fontSize: 10, color: "#34D399", letterSpacing: 1, textTransform: "uppercase", fontWeight: 700, marginBottom: 4 }}>Best Window</div>
                        <div style={{ fontSize: 13, color: "#D4D9E1", fontWeight: 600 }}>{result.climate_analysis.optimal_application_window.primary}</div>
                      </div>
                      <div style={{ flex: 1, padding: "10px 12px", background: "#1E293B", border: "1px solid #475569", borderRadius: 6 }}>
                        <div style={{ fontSize: 10, color: "#94A3B8", letterSpacing: 1, textTransform: "uppercase", fontWeight: 700, marginBottom: 4 }}>Secondary</div>
                        <div style={{ fontSize: 13, color: "#D4D9E1" }}>{result.climate_analysis.optimal_application_window.secondary}</div>
                      </div>
                      <div style={{ flex: 1, padding: "10px 12px", background: "#3D1417", border: "1px solid #7F2D35", borderRadius: 6 }}>
                        <div style={{ fontSize: 10, color: "#F87171", letterSpacing: 1, textTransform: "uppercase", fontWeight: 700, marginBottom: 4 }}>Avoid</div>
                        <div style={{ fontSize: 12, color: "#D4D9E1" }}>{result.climate_analysis.optimal_application_window.avoid}</div>
                      </div>
                    </div>
                  )}
                  <div style={{ fontSize: 12, color: "#6B7A8D", lineHeight: 1.6 }}>
                    {result.climate_analysis.application_timing_rationale}
                  </div>
                </div>
              </div>
            )}

            {/* Prescribed Application Rate + Batch Calculation */}
            {result.prescribed_application_rate && (
              <div style={{ marginBottom: 28 }}>
                <div style={{ fontSize: 11, color: "#4A9B6E", letterSpacing: 2, textTransform: "uppercase", fontWeight: 700, marginBottom: 12 }}>
                  Prescribed Rate & Production Order
                </div>
                <div style={{
                  padding: "16px 20px", background: "#111620", border: "1px solid #1E2A3A",
                  borderRadius: 8,
                }}>
                  <div style={{ display: "flex", gap: 32, marginBottom: 12, flexWrap: "wrap" }}>
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 28, fontWeight: 700, color: "#4A9B6E", fontFamily: "'IBM Plex Mono', monospace" }}>
                        {result.prescribed_application_rate.rate_lb_per_acre}
                      </div>
                      <div style={{ fontSize: 10, color: "#6B7A8D", letterSpacing: 1, textTransform: "uppercase" }}>lb/acre</div>
                    </div>
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 28, fontWeight: 700, color: "#6B7A8D", fontFamily: "'IBM Plex Mono', monospace" }}>
                        {result.prescribed_application_rate.rate_kg_per_ha}
                      </div>
                      <div style={{ fontSize: 10, color: "#6B7A8D", letterSpacing: 1, textTransform: "uppercase" }}>kg/ha</div>
                    </div>
                    {result.batch_calculation && (
                      <>
                        <div style={{ width: 1, background: "#1E2A3A", alignSelf: "stretch" }} />
                        <div style={{ textAlign: "center" }}>
                          <div style={{ fontSize: 28, fontWeight: 700, color: "#D4D9E1", fontFamily: "'IBM Plex Mono', monospace" }}>
                            {(result.batch_calculation.total_product_lbs || 0).toLocaleString()}
                          </div>
                          <div style={{ fontSize: 10, color: "#6B7A8D", letterSpacing: 1, textTransform: "uppercase" }}>total lbs needed</div>

                        <div style={{ textAlign: "center" }}>
                          <div style={{ fontSize: 28, fontWeight: 700, color: "#D4D9E1", fontFamily: "'IBM Plex Mono', monospace" }}>
                            {(result.batch_calculation.total_product_mt || 0).toFixed(1)}
                          </div>
                          <div style={{ fontSize: 10, color: "#6B7A8D", letterSpacing: 1, textTransform: "uppercase" }}>metric tons</div>
                        </div>
                      </>
                    )}
                  </div>
                  <div style={{ fontSize: 12, color: "#8899AA", lineHeight: 1.6 }}>
                    {result.prescribed_application_rate.rationale}
                  </div>
                </div>
              </div>
            )}

            {/* Pellet Feasibility + Economics side by side */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 28 }}>
              {result.pellet_feasibility && (
                <div style={{ padding: "16px", background: "#111620", border: "1px solid #1E2A3A", borderRadius: 8 }}>
                  <div style={{ fontSize: 11, color: "#6B7A8D", letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 600, marginBottom: 12 }}>
                    Pellet Feasibility
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                    <StatusTag status={result.pellet_feasibility.verdict} />
                  </div>
                  <div style={{ fontSize: 12, color: "#8899AA", marginBottom: 8 }}>
                    Binder: <span style={{ color: "#D4D9E1", fontFamily: "'IBM Plex Mono', monospace" }}>{(result.pellet_feasibility.binder_pct * 100).toFixed(0)}%</span>
                    {" / "}
                    Abrasive: <span style={{ color: "#D4D9E1", fontFamily: "'IBM Plex Mono', monospace" }}>{(result.pellet_feasibility.abrasive_pct * 100).toFixed(0)}%</span>
                  </div>
                  <div style={{ fontSize: 11, color: "#6B7A8D" }}>{result.pellet_feasibility.note}</div>
                </div>
              )}

              {result.economics && (
                <div style={{ padding: "16px", background: "#111620", border: "1px solid #1E2A3A", borderRadius: 8 }}>
                  <div style={{ fontSize: 11, color: "#6B7A8D", letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 600, marginBottom: 12 }}>
                    Economics
                  </div>
                  {[
                    ["Cost/MT", `$${result.economics.cost_per_mt?.toFixed(2)}`],
                    ["Cost/Acre", `$${result.economics.cost_per_acre?.toFixed(2)}`],
                    ["Cost/Lb", `$${result.economics.cost_per_lb?.toFixed(3)}`],
                    ["Sell/Lb", `$${result.economics.suggested_sell_per_lb?.toFixed(3)}`],
                    ["Gross Margin", `${((result.economics.gross_margin || 0) * 100).toFixed(0)}%`],
                    ...(result.batch_calculation ? [
                      ["Project Cost", `$${(result.batch_calculation.total_cost || 0).toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})}`],
                      ["Project Revenue", `$${(result.batch_calculation.total_revenue || 0).toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0})}`],
                    ] : []),
                  ].map(([label, val]) => (
                    <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: "1px solid #151D28" }}>
                      <span style={{ fontSize: 12, color: "#6B7A8D" }}>{label}</span>
                      <span style={{ fontSize: 13, fontWeight: 600, color: "#D4D9E1", fontFamily: "'IBM Plex Mono', monospace" }}>{val}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Reasoning */}
            {result.reasoning_summary && (
              <div style={{ marginBottom: 28 }}>
                <div style={{ fontSize: 11, color: "#4A9B6E", letterSpacing: 2, textTransform: "uppercase", fontWeight: 700, marginBottom: 12 }}>
                  Formulation Reasoning
                </div>
                <div style={{
                  padding: "16px 20px", background: "#111620", border: "1px solid #1E2A3A",
                  borderRadius: 8, fontSize: 13, color: "#A0AABB", lineHeight: 1.7,
                  whiteSpace: "pre-wrap",
                }}>
                  {result.reasoning_summary}
                </div>
              </div>
            )}

            {/* Back button */}
            <button
              onClick={() => setActiveTab("input")}
              style={{
                padding: "12px 24px", border: "1px solid #1E2A3A", borderRadius: 6,
                background: "transparent", color: "#6B7A8D", fontSize: 13, fontWeight: 600,
                cursor: "pointer", fontFamily: "inherit",
              }}
            >
              Modify Soil Test
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(XudateEngine), document.getElementById('root'));
</script>
</body>
</html>
